name: Briefing Diário

on:
  schedule:
    # 10:00 UTC = 07:00 BRT (UTC-3)
    - cron: "0 10 * * 1-5"   # Seg–Sex
  workflow_dispatch:           # Permite rodar manualmente pelo GitHub

permissions:
  contents: write              # Necessário para fazer commit do briefing.json

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
        run: python python/daily_briefing.py

      - name: Commit e push do briefing
        run: |
          git config user.name  "Trump Intel Bot"
          git config user.email "bot@trump-intel.local"
          git add data/briefing.json
          git diff --staged --quiet || git commit -m "briefing $(date +'%d/%m/%Y %H:%M BRT')"
          git push
